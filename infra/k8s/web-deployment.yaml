apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: autoinfra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: autoinfra-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: autoinfra-config
