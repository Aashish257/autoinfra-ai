apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoinfra-api
  namespace: autoinfra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoinfra-api
  template:
    metadata:
      labels:
        app: autoinfra-api
    spec:
      containers:
        - name: api
          image: autoinfra-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: autoinfra-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5