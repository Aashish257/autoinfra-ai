name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  REGISTRY: docker.io
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/autoinfra-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/autoinfra-web

jobs:
  # ── Job 1: Lint + Type Check ──────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install API deps
        run: npm ci
        working-directory: apps/api

      - name: Install Web deps
        run: npm ci
        working-directory: apps/web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:secret@localhost:5432/autoinfra_test

      - name: Type check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type check Web
        run: npx tsc --noEmit
        working-directory: apps/web

  # ── Job 2: Run Tests ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoinfra_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:secret@localhost:5432/autoinfra_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install API deps
        run: npm ci
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Run API tests
        run: npm test
        working-directory: apps/api

  # ── Job 3: Build + Push Docker Images ────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.API_IMAGE }}
            ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build + Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.API_IMAGE }}:${{ steps.meta.outputs.version }},${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build + Push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.version }},${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

  # ── Job 4: Notify Jenkins ─────────────────────────────────
  trigger-jenkins:
    name: Trigger Jenkins CD
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Jenkins deploy job
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/autoinfra-deploy/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode json='{"parameter": [{"name":"IMAGE_TAG", "value":"${{ needs.build.outputs.image_tag }}"}]}'